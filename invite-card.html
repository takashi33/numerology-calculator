<title>数秘電卓 招待カード</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-0: #12081f;
    --bg-1: #1b1039;
    --bg-2: #2c1a4d;
    --bg-3: #3a2260;
    --gold: #f4d98b;
    --gold-deep: #d9a94a;
    --ink: #f3eefc;
    --ink-soft: #cbb9f0;
    --ink-faint: #9c88c2;
    --card: rgba(255, 255, 255, 0.055);
    --card-border: rgba(244, 217, 139, 0.28);
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --font-body: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    background:
      radial-gradient(ellipse 120% 70% at 50% -10%, var(--bg-3) 0%, transparent 60%),
      linear-gradient(165deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  h1 { text-wrap: balance; }
  #card {
    max-width: 380px;
    margin: 0 auto;
    padding: 40px 24px 48px;
    text-align: center;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 0.04em;
    color: var(--gold);
    margin: 0 0 6px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin: 0 0 28px;
  }
  .qr-wrap {
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    display: inline-block;
    box-shadow: 0 0 30px rgba(244, 217, 139, 0.25);
    border: 1px solid var(--card-border);
  }
  .qr-wrap img {
    display: block;
    width: 100%;
    max-width: 260px;
    height: auto;
  }
  .instructions {
    margin-top: 28px;
    text-align: left;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--ink-soft);
  }
  .instructions ol { margin: 0; padding-left: 1.2em; }
  .instructions li { margin-bottom: 6px; }
  .passcode-box {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: #2a1a4d;
  }
  .passcode-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .passcode-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }
  .url-fallback {
    margin-top: 16px;
    font-size: 11px;
    color: var(--ink-faint);
    word-break: break-all;
    line-height: 1.7;
  }
  .note {
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-faint);
    line-height: 1.8;
  }
</style>
